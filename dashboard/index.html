    <script>
      'use strict'

      // ─── STATE ────────────────────────────────────────────────────────────
      let allMedia = [] // full list for current user
      let filtered = [] // filtered + sorted list
      let activeType = 'all'
      let activeSort = 'asc'
      let homeVisible = false
      let currentUsername = null

      // ─── DOM REFS ─────────────────────────────────────────────────────────
      const userListEl = document.getElementById('user-list')
      const userSearchEl = document.getElementById('user-search')
      const userCountEl = document.getElementById('user-count')
      const currentNameEl = document.getElementById('current-user-name')
      const mediaStatsEl = document.getElementById('media-stats')
      const filterSelect = document.getElementById('filter-select')
      const sortSelect = document.getElementById('sort-select')
      const sortBar = document.getElementById('sort-bar')
      const dateRangeEl = document.getElementById('date-range')
      const gridEl = document.getElementById('media-grid')
      const loadingEl = document.getElementById('loading-indicator')
      const noResultsEl = document.getElementById('no-results')
      const homeViewEl = document.getElementById('home-view')
      const homeGridEl = document.getElementById('home-grid')
      const homeSizeBtns = document.querySelectorAll('.home-size-btn')
      const homeSortSelect = document.getElementById('home-sort-select')
      let homeSort = 'random'

      // ─── HELPERS ──────────────────────────────────────────────────────────
      function formatDate(iso) {
        if (!iso) return 'Unknown date'
        const d = new Date(iso)
        return d.toLocaleString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
          hour12: true,
        })
      }

      function formatDateShort(iso) {
        if (!iso) return '—'
        const d = new Date(iso)
        return d.toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
        })
      }

      function formatFileSize(bytes) {
        if (!bytes) return ''
        const units = ['B', 'KB', 'MB', 'GB']
        let v = bytes,
          u = 0
        while (v >= 1024 && u < units.length - 1) {
          v /= 1024
          u++
        }
        return `${v.toFixed(v < 10 && u > 0 ? 1 : 0)} ${units[u]}`
      }

      function formatDuration(seconds) {
        if (!seconds || seconds <= 0) return ''
        const s = Math.round(seconds)
        const m = Math.floor(s / 60)
        const ss = String(s % 60).padStart(2, '0')
        return `${m}:${ss}`
      }

      // Map a video's pixel dimensions to a coarse quality tier shown as a chip.
      // Anything below 720p just gets a generic "SD" with the muted base color.
      function resolutionTier(w, h) {
        const m = Math.max(w || 0, h || 0)
        if (!m) return null
        if (m >= 2160) return { key: '4k', label: '4K' }
        if (m >= 1080) return { key: 'fhd', label: 'FHD' }
        if (m >= 720) return { key: 'hd', label: 'HD' }
        return { key: 'sd', label: 'SD' }
      }

      // ─── USERS ────────────────────────────────────────────────────────────
      let usersData = [] // [{ name, sources }]

      async function loadUsers() {
        const res = await fetch('/api/users')
        usersData = await res.json()
        userCountEl.textContent = usersData.length
        // First-ever load: stamp every known model with "seen now" so we don't
        // flood the home grid with NEW badges on first visit. Future additions
        // / updates after this stamp will show NEW.
        initLastSeen(usersData)
        renderUserList(usersData)
        // Apply whatever route is in the URL bar. Browsers preserve the hash
        // across refresh, so a deep link / refresh / back button all land here.
        applyHashRoute()
      }

      // ─── "NEW" TRACKING ───────────────────────────────────────────────────
      const LAST_SEEN_KEY = 'dashboard-last-seen'
      function readLastSeen() {
        try {
          return JSON.parse(localStorage.getItem(LAST_SEEN_KEY) || '{}')
        } catch {
          return {}
        }
      }
      function writeLastSeen(map) {
        try {
          localStorage.setItem(LAST_SEEN_KEY, JSON.stringify(map))
        } catch {}
      }
      function initLastSeen(users) {
        const seen = readLastSeen()
        const now = Date.now()
        let changed = false
        // Stamp models we've never recorded so we don't show NEW on first load.
        for (const u of users) {
          if (seen[u.name] == null) {
            seen[u.name] = now
            changed = true
          }
        }
        if (changed) writeLastSeen(seen)
      }
      function markSeen(username) {
        if (!username) return
        const seen = readLastSeen()
        seen[username] = Date.now()
        writeLastSeen(seen)
      }
      function isNewModel(u, seen) {
        const last = seen[u.name]
        if (last == null) return true // never recorded — treat as new
        return (u.latestAddedMs || 0) > last
      }

      // ─── HASH ROUTING ─────────────────────────────────────────────────────
      // #/                → home grid
      // #/u/<encoded name>→ that model's media view
      // Updates the URL whenever the user navigates (so browser back works),
      // and reacts to manual hash changes (paste a link, back/forward button).
      let _suppressHashChange = false
      function parseHashRoute() {
        const raw = (location.hash || '').replace(/^#/, '')
        const m = raw.match(/^\/u\/(.+)$/)
        if (m) return { view: 'user', username: decodeURIComponent(m[1]) }
        return { view: 'home' }
      }
      function setHashRoute(target) {
        const next =
          target.view === 'user'
            ? `#/u/${encodeURIComponent(target.username)}`
            : '#/'
        if (location.hash === next) return
        _suppressHashChange = true
        location.hash = next
      }
      function applyHashRoute() {
        const route = parseHashRoute()
        if (route.view === 'user') {
          const u = usersData.find((x) => x.name === route.username)
          if (u) {
            selectUser(u, null, { skipHashUpdate: true })
            return
          }
          // Unknown model — bounce back to home rather than show a broken view.
        }
        showHomeView({ skipHashUpdate: true })
      }
      window.addEventListener('hashchange', () => {
        if (_suppressHashChange) {
          _suppressHashChange = false
          return
        }
        applyHashRoute()
      })

      // Models whose full media has been loaded — their client-resolved dates are
      // more accurate than the server's fast buildModelStats() scan, so we preserve
      // them on periodic refresh and only update file count + latest-added.
      const _accurateModels = new Set()

      async function refreshUsers() {
        try {
          const res = await fetch('/api/users')
          if (!res.ok) return
          const fresh = await res.json()
          let changed = false
          for (const u of fresh) {
            const idx = usersData.findIndex((x) => x.name === u.name)
            if (idx === -1) {
              usersData.push(u)
              changed = true
            } else {
              const prev = usersData[idx]
              const update = {
                fileCount: u.fileCount,
                latestAddedMs: u.latestAddedMs,
              }
              // Only overwrite media dates for models not yet visited by the client
              if (!_accurateModels.has(u.name)) {
                update.earliestMs = u.earliestMs
                update.latestMs = u.latestMs
                update.yearCounts = u.yearCounts
              }
              const needsUpdate = Object.entries(update).some(
                ([k, v]) => prev[k] !== v
              )
              if (needsUpdate) {
                usersData[idx] = { ...prev, ...update }
                changed = true
              }
            }
          }
          if (changed) {
            userCountEl.textContent = usersData.length
            renderUserList(usersData)
            if (homeVisible) renderHomeGrid()
          }
        } catch {}
      }

      // Refresh every 5 minutes — picks up new files without a page reload
      setInterval(refreshUsers, 5 * 60 * 1000)

      // ─── HOME VIEW ────────────────────────────────────────────────────────
      function showHomeView(opts = {}) {
        homeVisible = true
        currentUsername = null
        document.getElementById('home-btn').classList.add('active')
        homeViewEl.classList.add('visible')
        loadingEl.style.display = 'none'
        noResultsEl.style.display = 'none'
        gridEl.style.display = 'none'
        sortBar.style.display = 'none'
        currentNameEl.textContent = 'All Models'
        filterSelect.style.display = 'none'
        const st = document.getElementById('stats-toggle')
        if (st) st.style.display = 'none'
        const sd = document.getElementById('stats-details')
        if (sd) { sd.classList.remove('open'); sd.innerHTML = '' }
        if (mediaStatsEl) mediaStatsEl.textContent = ''
        sourceLinksEl.innerHTML = ''
        if (!opts.skipHashUpdate) setHashRoute({ view: 'home' })
        renderHomeGrid()
      }

      function hideHomeView() {
        homeVisible = false
        document.getElementById('home-btn').classList.remove('active')
        homeViewEl.classList.remove('visible')
        gridEl.style.display = ''
      }

      // Global year range across all models — defines the x-axis for every card
      function getYearRange() {
        let minYear = Infinity,
          maxYear = new Date().getFullYear()
        for (const u of usersData) {
          if (u.earliestMs)
            minYear = Math.min(minYear, new Date(u.earliestMs).getFullYear())
          if (u.latestMs)
            maxYear = Math.max(maxYear, new Date(u.latestMs).getFullYear())
          // Also scan yearCounts keys — these include filesystem-fallback years that
          // earliestMs/latestMs don't capture (since those only track real media dates)
          for (const yr of Object.keys(u.yearCounts || {})) {
            const y = parseInt(yr, 10)
            if (!isNaN(y)) {
              minYear = Math.min(minYear, y)
              maxYear = Math.max(maxYear, y)
            }
          }
        }
        return { start: minYear === Infinity ? maxYear : minYear, end: maxYear }
      }

      // Held in memory across renders so Random stays stable while navigating
      // (clicking into a model and back doesn't reshuffle). The shuffle button
      // and re-selecting Random both regenerate it.
      let _homeRandomOrder = null
      function reshuffleHome() {
        const names = usersData.map((u) => u.name)
        // Fisher-Yates
        for (let i = names.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1))
          ;[names[i], names[j]] = [names[j], names[i]]
        }
        _homeRandomOrder = new Map(names.map((n, i) => [n, i]))
      }

      function renderHomeGrid() {
        homeGridEl.innerHTML = ''
        const { start: globalStart, end: globalEnd } = getYearRange()
        const seen = readLastSeen()
        if (homeSort === 'random' && !_homeRandomOrder) reshuffleHome()

        // Sort order: featured → NEW models → everything else.
        // Within each tier we honor the selected sort. NEW models are sorted
        // by latestAddedMs desc so the freshest content is genuinely first.
        const sorted = [...usersData].sort((a, b) => {
          if (a.featured && !b.featured) return -1
          if (b.featured && !a.featured) return 1
          const aNew = isNewModel(a, seen) ? 1 : 0
          const bNew = isNewModel(b, seen) ? 1 : 0
          if (aNew !== bNew) return bNew - aNew // new first
          if (aNew && bNew)
            return (b.latestAddedMs || 0) - (a.latestAddedMs || 0)
          if (homeSort === 'oldest-media')
            return (a.earliestMs || Infinity) - (b.earliestMs || Infinity)
          if (homeSort === 'newest-media')
            return (b.latestMs || 0) - (a.latestMs || 0)
          if (homeSort === 'recently-added')
            return (b.latestAddedMs || 0) - (a.latestAddedMs || 0)
          if (homeSort === 'random') {
            return (
              (_homeRandomOrder.get(a.name) ?? 9e9) -
              (_homeRandomOrder.get(b.name) ?? 9e9)
            )
          }
          return a.name.localeCompare(b.name, undefined, {
            sensitivity: 'base',
          })
        })

        for (const u of sorted) {
          const isFeatured = !!u.featured
          const card = document.createElement('div')
          card.className = 'home-card' + (isFeatured ? ' featured' : '')
          card.addEventListener('click', () => selectUser(u))

          // Placeholder thumb (replaced async)
          const mediaEl = document.createElement('div')
          mediaEl.className = 'home-card-thumb'
          mediaEl.style.background = 'var(--card-bg)'
          card.appendChild(mediaEl)

          if (isFeatured) {
            const badge = document.createElement('div')
            badge.className = 'featured-badge'
            badge.textContent = '⭐ Model of the Day'
            card.style.position = 'relative'
            card.appendChild(badge)
          }

          // Cover ships with the user object now — no extra HTTP request.
          // Always renders as <img> so the home grid never streams full videos
          // or layers audio across cards. Video covers use the pre-generated
          // GIF preview (cached on disk by the server).
          const useCover = (cover) => {
            if (!cover) return
            const el = document.createElement('img')
            el.loading = 'lazy'
            el.alt = u.name
            el.className = 'home-card-thumb'
            // Prefer the small JPEG thumbnail. Fall back to the GIF preview
            // (videos pre-cover-thumbs era) and finally to the source file.
            el.src = cover.thumbUrl || cover.previewUrl || cover.url
            el.onerror = () => {
              el.style.opacity = '0.3'
            }
            if (mediaEl.parentNode === card) card.replaceChild(el, mediaEl)
          }
          if (u.cover) {
            useCover(u.cover)
          } else {
            fetch(`/api/users/${encodeURIComponent(u.name)}/cover`)
              .then((r) => (r.ok ? r.json() : null))
              .then(useCover)
              .catch(() => {})
          }

          const body = document.createElement('div')
          body.className = 'home-card-body'

          const name = document.createElement('div')
          name.className = 'home-card-name'
          name.textContent = u.name
          if (isNewModel(u, seen)) {
            const newPill = document.createElement('span')
            newPill.className = 'home-card-new'
            newPill.textContent = 'NEW'
            name.appendChild(document.createTextNode(' '))
            name.appendChild(newPill)
          }

          const srcs = document.createElement('div')
          srcs.className = 'home-card-sources'
          for (const [key, label] of [
            ['coomer', 'OF'],
            ['kemono', 'K'],
            ['stufferdb', 'S'],
          ]) {
            const dot = document.createElement('span')
            dot.className =
              'home-src-dot' + (u.sources?.[key]?.length ? ' has-source' : '')
            dot.textContent = label
            srcs.appendChild(dot)
          }

          body.appendChild(name)
          body.appendChild(srcs)

          // Folder size + file count — small muted line, helps eyeball which
          // models are eating disk and how big each is.
          if (u.fileCount || u.totalBytes) {
            const sizeLine = document.createElement('div')
            sizeLine.className = 'home-card-size'
            const fc = u.fileCount || 0
            const sz = formatFileSize(u.totalBytes || 0)
            const parts = []
            if (sz) parts.push(sz)
            parts.push(`${fc.toLocaleString()} file${fc === 1 ? '' : 's'}`)
            sizeLine.textContent = parts.join(' · ')
            body.appendChild(sizeLine)
          }

          // Activity graph — GitHub-style year cells
          {
            const yearCounts = u.yearCounts || {}
            const maxCount = Math.max(...Object.values(yearCounts), 1)

            const activity = document.createElement('div')
            activity.className = 'home-card-activity'

            // Year labels: just show start + end
            const labels = document.createElement('div')
            labels.className = 'activity-labels'
            const lStart = document.createElement('span')
            lStart.className = 'activity-label'
            lStart.textContent = globalStart
            const lEnd = document.createElement('span')
            lEnd.className = 'activity-label'
            lEnd.textContent = globalEnd
            labels.appendChild(lStart)
            labels.appendChild(lEnd)

            // Cell row
            const graph = document.createElement('div')
            graph.className = 'activity-graph'

            // Log scale instead of linear: a year with 5 files visibly lights
            // up next to a year with 5000, instead of getting flattened to lvl-1.
            const logMax = Math.log(maxCount + 1)
            for (let yr = globalStart; yr <= globalEnd; yr++) {
              const count = yearCounts[yr] || 0
              const cell = document.createElement('div')
              const ratio = count > 0 ? Math.log(count + 1) / logMax : 0
              const lvl =
                count === 0
                  ? 0
                  : ratio < 0.35
                    ? 1
                    : ratio < 0.65
                      ? 2
                      : ratio < 0.9
                        ? 3
                        : 4
              cell.className = `yr-cell${lvl > 0 ? ` lvl-${lvl}` : ''}`
              cell.title =
                count > 0 ? `${yr}: ${count} files` : `${yr}: no files`
              graph.appendChild(cell)
            }

            activity.appendChild(labels)
            activity.appendChild(graph)
            body.appendChild(activity)
          }

          card.appendChild(body)
          homeGridEl.appendChild(card)
        }
      }

      function renderUserList(users) {
        userListEl.innerHTML = ''
        for (const u of users) {
          const li = document.createElement('li')
          li.className = 'user-item'
          li.textContent = u.name
          li.dataset.username = u.name
          li.addEventListener('click', () => selectUser(u, li))
          userListEl.appendChild(li)
        }
      }

      userSearchEl.addEventListener('input', () => {
        const q = userSearchEl.value.toLowerCase()
        for (const li of userListEl.querySelectorAll('.user-item')) {
          li.style.display = li.dataset.username.toLowerCase().includes(q)
            ? ''
            : 'none'
        }
        // Reset highlight when the visible set changes.
        _kbdIndex = -1
        applyKbdHighlight()
      })

      // ─── KEYBOARD NAV (sidebar) ──────────────────────────────────────────
      // /         focus search
      // Up/Down   move highlight through visible models
      // Enter     open the highlighted model
      // Esc       clear search if focused, else blur
      let _kbdIndex = -1
      function visibleUserItems() {
        return Array.from(userListEl.querySelectorAll('.user-item')).filter(
          (el) => el.style.display !== 'none'
        )
      }
      function applyKbdHighlight() {
        const items = visibleUserItems()
        items.forEach((el, i) =>
          el.classList.toggle('kbd-focus', i === _kbdIndex)
        )
        if (_kbdIndex >= 0 && items[_kbdIndex]) {
          items[_kbdIndex].scrollIntoView({ block: 'nearest' })
        }
      }
      window.addEventListener('keydown', (e) => {
        // Don't hijack typing in inputs other than the user-search itself.
        const t = e.target
        const inOtherInput =
          t &&
          (t.tagName === 'INPUT' ||
            t.tagName === 'TEXTAREA' ||
            t.tagName === 'SELECT') &&
          t !== userSearchEl
        if (inOtherInput) return

        if (e.key === '/' && !e.metaKey && !e.ctrlKey) {
          if (document.activeElement !== userSearchEl) {
            e.preventDefault()
            // Make sure the sidebar is open on mobile so the input is reachable.
            if (isMobile()) openSidebar()
            userSearchEl.focus()
            userSearchEl.select()
          }
          return
        }
        if (e.key === 'Escape') {
          if (document.activeElement === userSearchEl) {
            if (userSearchEl.value) {
              userSearchEl.value = ''
              userSearchEl.dispatchEvent(new Event('input'))
            } else {
              userSearchEl.blur()
            }
          }
          return
        }
        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
          const items = visibleUserItems()
          if (!items.length) return
          // Only intercept arrows if we're in the sidebar context (search focused
          // or no input focused at all).
          if (t && t.tagName === 'INPUT' && t !== userSearchEl) return
          e.preventDefault()
          _kbdIndex =
            _kbdIndex < 0
              ? 0
              : Math.max(
                  0,
                  Math.min(
                    items.length - 1,
                    _kbdIndex + (e.key === 'ArrowDown' ? 1 : -1)
                  )
                )
          applyKbdHighlight()
          return
        }
        if (e.key === 'Enter' && _kbdIndex >= 0) {
          const items = visibleUserItems()
          if (items[_kbdIndex]) {
            e.preventDefault()
            items[_kbdIndex].click()
          }
        }
      })

      // ─── SOURCE LINKS ─────────────────────────────────────────────────────────────
      const sourceLinksEl = document.getElementById('source-links')

      const LINK_ICON = `<svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3H3a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1V7"/><polyline points="8 1 11 1 11 4"/><line x1="5" y1="7" x2="11" y2="1"/></svg>`

      const SERVICE_LABELS = {
        onlyfans: 'OnlyFans',
        fansly: 'Fansly',
        patreon: 'Patreon',
        fanbox: 'Fanbox',
        candfans: 'C&F',
        subscribestar: 'SubStar',
        gumroad: 'Gumroad',
        afdian: 'Afdian',
        boosty: 'Boosty',
        discord: 'Discord',
        fantia: 'Fantia',
        dlsite: 'DLsite',
      }

      // platform → short display prefix shown before the service name
      const PLATFORM_PREFIX = {
        coomer: '', // coomer URLs already carry the service name
        kemono: 'K·',
        stufferdb: '',
      }

      function renderSourceLinks(sources) {
        sourceLinksEl.innerHTML = ''
        if (!sources) return

        for (const url of sources.stufferdb || []) {
          const a = document.createElement('a')
          a.className = 'src-link'
          a.href = url
          a.target = '_blank'
          a.rel = 'noopener noreferrer'
          a.innerHTML = `${LINK_ICON} StufferDB`
          sourceLinksEl.appendChild(a)
        }

        for (const [platform, prefix] of [
          ['coomer', ''],
          ['kemono', 'K·'],
        ]) {
          for (const url of sources[platform] || []) {
            const service = url.split('/')[3] || platform
            const label = SERVICE_LABELS[service] || service
            const a = document.createElement('a')
            a.className = 'src-link'
            a.href = url
            a.target = '_blank'
            a.rel = 'noopener noreferrer'
            a.innerHTML = `${LINK_ICON} ${prefix}${label}`
            sourceLinksEl.appendChild(a)
          }
        }
      }

      async function selectUser(userObj, liEl, opts = {}) {
        const username = typeof userObj === 'string' ? userObj : userObj.name
        const sources = typeof userObj === 'object' ? userObj.sources : null
        closeSidebar()
        hideHomeView()
        if (!opts.skipHashUpdate) setHashRoute({ view: 'user', username })

        userListEl
          .querySelectorAll('.user-item')
          .forEach((el) => el.classList.remove('active'))
        // find the li if not passed
        const li =
          liEl ||
          userListEl.querySelector(`[data-username="${CSS.escape(username)}"]`)
        if (li) li.classList.add('active')

        currentUsername = username
        markSeen(username)
        currentNameEl.textContent = username
        renderSourceLinks(sources)

        // Restore the user's last sort for this model (defaults to 'asc').
        let savedSort = 'asc'
        try {
          savedSort =
            localStorage.getItem(`dashboard-sort-${username}`) || 'asc'
        } catch {}
        activeSort = savedSort
        sortSelect.value = savedSort

        setActiveType('all')
        filterSelect.style.display = 'block'
        document.getElementById('stats-toggle').style.display = ''
        gridEl.innerHTML = ''
        noResultsEl.style.display = 'none'
        sortBar.style.display = 'none'
        loadingEl.style.display = 'flex'

        const mediaData = await fetch(
          `/api/users/${encodeURIComponent(username)}/media`
        )
          .then((r) => (r.ok ? r.json() : null))
          .catch(() => null)
        allMedia = mediaData || []

        // ── Update this model's activity graph with accurate media dates ──────
        // buildModelStats() runs fast (no ffprobe/EXIF) so its yearCounts can be
        // wrong for files without sidecar/filename dates. Now that we have the
        // full resolved dates (EXIF, MP4 metadata, etc.), refresh usersData so
        // the home graph is correct the next time it's rendered.
        if (allMedia.length) {
          const uIdx = usersData.findIndex((u) => u.name === username)
          if (uIdx !== -1) {
            const yc = {}
            let earliest = Infinity,
              latest = 0
            for (const m of allMedia) {
              const dateMs = m.mediaDateMs || m.addedMs
              if (!dateMs) continue
              const yr = new Date(dateMs).getFullYear()
              if (yr >= 1990 && yr <= 2035) yc[yr] = (yc[yr] || 0) + 1
              if (m.mediaDateMs) {
                if (m.mediaDateMs < earliest) earliest = m.mediaDateMs
                if (m.mediaDateMs > latest) latest = m.mediaDateMs
              }
            }
            usersData[uIdx] = {
              ...usersData[uIdx],
              yearCounts: yc,
              earliestMs:
                earliest === Infinity ? usersData[uIdx].earliestMs : earliest,
              latestMs: latest || usersData[uIdx].latestMs,
            }
            _accurateModels.add(username)
          }
        }

        loadingEl.style.display = 'none'
        sortBar.style.display = allMedia.length ? 'flex' : 'none'
        applyFilter()
        updateStats()
      }

      // ─── FILTER + SORT ────────────────────────────────────────────────────
      function applyFilter() {
        filtered =
          activeType === 'all'      ? [...allMedia]
          : activeType === 'flagged' ? allMedia.filter((m) => m.flagged)
                                     : allMedia.filter((m) => m.type === activeType)

        // Sort by real media date, falling back to added-to-disk date as last resort
        const effectiveDate = (m) => m.mediaDateMs || m.addedMs
        const byMediaDate = (dir) => (a, b) => {
          const da = effectiveDate(a),
            db = effectiveDate(b)
          return dir === 'asc' ? da - db : db - da
        }

        if (activeSort === 'asc') filtered.sort(byMediaDate('asc'))
        else if (activeSort === 'desc') filtered.sort(byMediaDate('desc'))
        else if (activeSort === 'added-asc')
          filtered.sort((a, b) => a.addedMs - b.addedMs)
        else if (activeSort === 'added-desc')
          filtered.sort((a, b) => b.addedMs - a.addedMs)
        else if (activeSort === 'size-desc')
          filtered.sort((a, b) => b.size - a.size)
        else if (activeSort === 'size-asc')
          filtered.sort((a, b) => a.size - b.size)
        else if (activeSort === 'duration-desc')
          filtered.sort((a, b) => b.duration - a.duration)
        else if (activeSort === 'duration-asc')
          filtered.sort((a, b) => a.duration - b.duration)

        renderGrid()
        updateDateRange()
      }

      // Keep pills + select in sync
      function setActiveType(type) {
        activeType = type
        filterSelect.value = type
      }

      filterSelect.addEventListener('change', () => {
        setActiveType(filterSelect.value)
        applyFilter()
      })

      sortSelect.addEventListener('change', () => {
        activeSort = sortSelect.value
        applyFilter()
        // Remember per-model so switching back restores the user's choice.
        if (currentUsername) {
          try {
            localStorage.setItem(
              `dashboard-sort-${currentUsername}`,
              activeSort
            )
          } catch {}
        }
      })

      function updateStats() {
        if (!allMedia.length) {
          if (mediaStatsEl) mediaStatsEl.textContent = 'No media found'
          updateStatsDetails(null)
          return
        }
        let imgs = 0, gifs = 0, vids = 0, flagged = 0, captioned = 0
        let sizeImgs = 0, sizeGifs = 0, sizeVids = 0
        for (const m of allMedia) {
          const sz = m.size || 0
          if (m.type === 'image') { imgs++; sizeImgs += sz }
          else if (m.type === 'gif') { gifs++; sizeGifs += sz }
          else if (m.type === 'video') { vids++; sizeVids += sz }
          if (m.flagged) flagged++
          if (m.hasCaption) captioned++
        }
        const totalSize = sizeImgs + sizeGifs + sizeVids
        const parts = []
        if (totalSize) parts.push(formatFileSize(totalSize))
        if (imgs) parts.push(`${imgs} image${imgs !== 1 ? 's' : ''}`)
        if (gifs) parts.push(`${gifs} GIF${gifs !== 1 ? 's' : ''}`)
        if (vids) parts.push(`${vids} video${vids !== 1 ? 's' : ''}`)
        if (flagged) parts.push(`${flagged} flagged`)
        if (mediaStatsEl) mediaStatsEl.textContent = parts.join(' · ')

        updateStatsDetails({ imgs, gifs, vids, flagged, captioned, sizeImgs, sizeGifs, sizeVids, totalSize })

        // Update filter dropdown labels with counts.
        const labels = {
          all: `All (${allMedia.length})`,
          image: imgs ? `Images (${imgs})` : 'Images',
          gif: gifs ? `GIFs (${gifs})` : 'GIFs',
          video: vids ? `Videos (${vids})` : 'Videos',
          flagged: flagged ? `Flagged (${flagged})` : 'Flagged',
        }
        for (const [type, label] of Object.entries(labels)) {
          const opt = filterSelect.querySelector(`option[value="${type}"]`)
          if (opt) opt.textContent = label
        }
        // Hide the Flagged option when nothing is flagged — keeps the menu clean.
        const flaggedOpt = filterSelect.querySelector('option[value="flagged"]')
        if (flaggedOpt) flaggedOpt.hidden = flagged === 0
      }

      // Populates the slide-down details panel under the header. Built lazily —
      // panel is hidden by default and only rendered when the user expands it.
      function updateStatsDetails(s) {
        const panel = document.getElementById('stats-details')
        if (!panel) return
        if (!s) { panel.innerHTML = ''; return }
        const row = (label, value) => `<div class="stats-row"><span class="stats-label">${label}</span><span class="stats-value">${value}</span></div>`
        const pct = (n, d) => d ? Math.round((n / d) * 100) + '%' : '—'
        const total = allMedia.length
        panel.innerHTML = `
          <div class="stats-grid">
            ${row('Total size', formatFileSize(s.totalSize) || '—')}
            ${row('Files',       total.toLocaleString())}
            ${row('Images',     `${s.imgs.toLocaleString()} · ${formatFileSize(s.sizeImgs) || '0'}`)}
            ${row('GIFs',       `${s.gifs.toLocaleString()} · ${formatFileSize(s.sizeGifs) || '0'}`)}
            ${row('Videos',     `${s.vids.toLocaleString()} · ${formatFileSize(s.sizeVids) || '0'}`)}
            ${row('Captioned',  `${s.captioned.toLocaleString()} (${pct(s.captioned, total)})`)}
            ${row('Flagged',    `${s.flagged.toLocaleString()}${s.flagged ? ` (${pct(s.flagged, total)})` : ''}`)}
          </div>
        `
      }

      function updateDateRange() {
        if (!filtered.length) {
          dateRangeEl.textContent = ''
          return
        }

        // Pick the value to range over by sort kind. Compute min/max explicitly
        // (don't rely on filtered order — it might be sorted by size/duration).
        const pickValue =
          activeSort === 'added-asc' || activeSort === 'added-desc'
            ? (m) => m.addedMs
            : (m) => m.mediaDateMs || m.addedMs

        let min = Infinity,
          max = 0
        for (const m of filtered) {
          const v = pickValue(m)
          if (!v) continue
          if (v < min) min = v
          if (v > max) max = v
        }
        if (min === Infinity) {
          dateRangeEl.textContent = ''
          return
        }
        const toISO = (ms) => new Date(ms).toISOString()
        dateRangeEl.textContent = `${formatDateShort(toISO(min))} – ${formatDateShort(toISO(max))}`
      }

      // ─── GRID RENDER ──────────────────────────────────────────────────────
      const SOURCE_LABELS = {
        exif: 'exif',
        mp4: 'mp4',
        uploaded: 'upload',
        filesystem: 'local*',
      }
      const SOURCE_TIPS = {
        exif: 'Date from embedded EXIF metadata',
        mp4: 'Date from video container metadata (ffprobe)',
        uploaded: 'Platform upload date (set by milkmaid)',
        filesystem: '* Local download date — least reliable',
        filename: 'filename timestamp',
      }
      const DATE_FMT = { year: '2-digit', month: 'numeric', day: 'numeric' }

      function createCard(item, i) {
        const card = document.createElement('div')
        card.className = 'media-card' + (item.flagged ? ' flagged' : '')
        card.dataset.index = i
        if (item.flagged) {
          const ribbon = document.createElement('div')
          ribbon.className = 'card-flag-ribbon'
          ribbon.title = 'Flagged for deletion'
          ribbon.textContent = '🚩'
          card.appendChild(ribbon)
        }

        const thumb = document.createElement('div')
        thumb.className = 'card-thumb'

        if (item.type === 'video') {
          const img = document.createElement('img')
          img.loading = 'lazy'
          img.style.cssText =
            'width:100%;height:100%;object-fit:cover;display:block;'
          if (item.previewUrl) {
            img.src = item.previewUrl
            img.onerror = () => {
              img.remove()
              const ph = document.createElement('div')
              ph.style.cssText =
                'width:100%;height:100%;background:#0a0a10;display:flex;align-items:center;justify-content:center;color:#444;font-size:11px;'
              ph.textContent = '⏳'
              thumb.insertBefore(ph, thumb.firstChild)
            }
          }
          thumb.appendChild(img)

          const tier = resolutionTier(item.width, item.height)
          if (tier) {
            const chip = document.createElement('span')
            chip.className = `card-res-badge tier-${tier.key}`
            chip.textContent = tier.label
            chip.title = `${item.width}×${item.height}`
            thumb.appendChild(chip)
          }
        } else {
          const img = document.createElement('img')
          img.loading = 'lazy'
          // Use the small JPEG thumbnail for grid cards. The lightbox still
          // loads item.url (the original) when the card is clicked.
          img.src = item.thumbUrl || item.url
          img.alt = item.filename
          img.onerror = () => {
            // Fall back to the source if the thumb endpoint failed (e.g. sharp
            // rejected the format) — slower but the card still shows something.
            if (img.dataset.fallback) {
              img.style.opacity = '0.3'
              img.alt = '⚠ load error'
              return
            }
            img.dataset.fallback = '1'
            img.src = item.url
          }
          thumb.appendChild(img)
        }

        const overlay = document.createElement('div')
        overlay.className = 'card-overlay'
        thumb.appendChild(overlay)

        const footer = document.createElement('div')
        footer.className = 'card-footer'

        const left = document.createElement('div')
        left.style.cssText =
          'display:flex;align-items:center;gap:3px;min-width:0;overflow:hidden;'

        const badge = document.createElement('span')
        badge.className = `type-badge ${item.type}`
        badge.textContent = item.type === 'image' ? 'img' : item.type
        left.appendChild(badge)

        if (item.source && item.source !== 'filename') {
          const srcBadge = document.createElement('span')
          srcBadge.className = `source-badge ${item.source}`
          srcBadge.textContent = SOURCE_LABELS[item.source] || item.source
          srcBadge.title = SOURCE_TIPS[item.source] || item.source
          left.appendChild(srcBadge)
        }

        const dateEl = document.createElement('span')
        dateEl.className = 'card-date'
        dateEl.textContent = item.date
          ? new Date(item.date).toLocaleDateString('en-US', DATE_FMT)
          : '—'
        dateEl.title =
          formatDate(item.date) + (item.source ? ` [${item.source}]` : '')
        left.appendChild(dateEl)

        const addedEl = document.createElement('span')
        addedEl.className = 'card-added'
        addedEl.textContent = item.addedMs
          ? new Date(item.addedMs).toLocaleDateString('en-US', DATE_FMT)
          : '—'
        addedEl.title = item.addedMs
          ? `Added: ${formatDate(new Date(item.addedMs).toISOString())}`
          : 'Added date unknown'

        footer.appendChild(left)
        footer.appendChild(addedEl)
        card.appendChild(thumb)
        card.appendChild(footer)
        card.addEventListener('click', () => openLightbox(i))
        return card
      }

      // Renders the first ~200 cards synchronously for fast first paint, then
      // appends 200 more whenever the user scrolls within 500px of the bottom.
      // For a 4000-item model, mobile only creates ~200 DOM nodes upfront
      // instead of all 4000 — first paint goes from seconds to milliseconds.
      let _renderToken = 0
      let _scrollObserver = null
      function renderGrid() {
        gridEl.innerHTML = ''
        if (_scrollObserver) {
          _scrollObserver.disconnect()
          _scrollObserver = null
        }

        if (!filtered.length) {
          noResultsEl.style.display = 'block'
          return
        }
        noResultsEl.style.display = 'none'

        const token = ++_renderToken
        const INITIAL = 200
        const BATCH = 200
        let i = 0

        const renderBatch = (n) => {
          if (_renderToken !== token) return
          const end = Math.min(i + n, filtered.length)
          const frag = document.createDocumentFragment()
          for (; i < end; i++) frag.appendChild(createCard(filtered[i], i))
          gridEl.appendChild(frag)
        }

        renderBatch(INITIAL)
        if (i >= filtered.length) return

        // Sentinel sits at the end of the grid; when it enters the viewport
        // (or gets within 500px) we render the next batch and re-observe.
        const sentinel = document.createElement('div')
        sentinel.id = 'grid-sentinel'
        sentinel.style.cssText = 'grid-column: 1 / -1; height: 1px;'
        gridEl.appendChild(sentinel)

        _scrollObserver = new IntersectionObserver(
          (entries) => {
            if (!entries[0].isIntersecting) return
            if (_renderToken !== token) {
              _scrollObserver.disconnect()
              return
            }
            // Re-attach sentinel after the new cards so it stays at the bottom.
            gridEl.removeChild(sentinel)
            renderBatch(BATCH)
            if (i >= filtered.length) {
              _scrollObserver.disconnect()
              _scrollObserver = null
            } else {
              gridEl.appendChild(sentinel)
            }
          },
          {
            root: document.getElementById('grid-container'),
            rootMargin: '500px',
          }
        )
        _scrollObserver.observe(sentinel)
      }

      // ─── LIGHTBOX (PhotoSwipe v5) ─────────────────────────────────────────
      // Use PhotoSwipe core directly (no lightbox wrapper) for programmatic use.
      // Cache the import promise so the first click opens instantly.
      let _pswpModule = null
      function loadPswp() {
        if (!_pswpModule) {
          _pswpModule = import(
            'https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.esm.js'
          ).then((m) => m.default)
        }
        return _pswpModule
      }
      loadPswp() // preload immediately

      function openLightbox(startIndex) {
        loadPswp().then((PhotoSwipe) => {
          const dataSource = filtered.map((item) => {
            if (item.type === 'video') {
              // No autoplay here — PhotoSwipe pre-creates ±1 adjacent slides,
              // and autoplay on those layers audio across slides. The active
              // slide is played from the `change` handler below.
              const wrap = document.createElement('div')
              wrap.className = 'pswp-video-wrap'
              const video = document.createElement('video')
              video.controls = true
              video.loop = true
              video.playsInline = true
              video.preload = 'metadata'
              video.src = item.url
              wrap.appendChild(video)
              return { html: wrap.outerHTML, _item: item }
            }
            return {
              src: item.url,
              width: item.width || 0,
              height: item.height || 0,
              _item: item,
            }
          })

          const pswp = new PhotoSwipe({
            dataSource,
            index: startIndex,
            bgOpacity: 0.97,
            padding: { top: 44, bottom: 0, left: 44, right: 44 },
            loop: true,
            wheelToZoom: true,
          })

          let infoPanelEl = null
          let captionPanelEl = null

          // Caption fetch cache for this lightbox instance — keyed by item URL.
          // Avoids re-fetching when the user swipes back and forth.
          const _captionCache = new Map()
          async function loadCaption(item) {
            if (!item || !item.hasCaption) return null
            if (_captionCache.has(item.url)) return _captionCache.get(item.url)
            try {
              const r = await fetch(
                `/api/caption/${encodeURIComponent(currentUsername || '')}/${item.folder}/${encodeURIComponent(item.filename)}`
              )
              if (!r.ok) {
                _captionCache.set(item.url, null)
                return null
              }
              const data = await r.json()
              const txt =
                data && typeof data.text === 'string' ? data.text : null
              _captionCache.set(item.url, txt)
              return txt
            } catch {
              _captionCache.set(item.url, null)
              return null
            }
          }

          // All UI registration happens inside uiRegister — pswp.ui is guaranteed
          // to exist here (set in _createMainStructure before ui.init fires this event).
          // Compute the model's overall date range once for the slider.
          // Uses every loaded media item (not just the filtered subset) so the
          // slider position is "where this falls in the model's history" rather
          // than "where it falls in the current filter".
          let _modelMinMs = Infinity
          let _modelMaxMs = -Infinity
          for (const m of allMedia) {
            const t = m.mediaDateMs || m.addedMs
            if (!t) continue
            if (t < _modelMinMs) _modelMinMs = t
            if (t > _modelMaxMs) _modelMaxMs = t
          }
          const _dateRangeOk = _modelMaxMs > _modelMinMs

          pswp.on('uiRegister', () => {
            // Slide counter (top-bar, left of zoom/close)
            pswp.ui.registerElement({
              name: 'pswp-counter',
              order: 5,
              isButton: false,
              onInit(el) {
                const update = () => {
                  el.textContent = `${pswp.currIndex + 1} / ${pswp.getNumItems()}`
                }
                pswp.on('change', update)
                update()
              },
            })

            // Date-position slider — sits just right of the counter on the top
            // bar. Only registered when the model spans more than one date.
            if (_dateRangeOk) {
              pswp.ui.registerElement({
                name: 'pswp-date-slider',
                order: 6,
                isButton: false,
                onInit(el) {
                  const label = document.createElement('div')
                  label.className = 'pswp-date-slider-label'
                  const track = document.createElement('div')
                  track.className = 'pswp-date-slider-track'
                  const thumb = document.createElement('div')
                  thumb.className = 'pswp-date-slider-thumb'
                  track.appendChild(thumb)
                  el.appendChild(label)
                  el.appendChild(track)
                  el.title = `${formatDateShort(new Date(_modelMinMs).toISOString())} — ${formatDateShort(new Date(_modelMaxMs).toISOString())}`

                  const update = () => {
                    const item = filtered[pswp.currIndex]
                    if (!item) return
                    const t = item.mediaDateMs || item.addedMs || 0
                    const pct = t
                      ? Math.max(
                          0,
                          Math.min(
                            100,
                            ((t - _modelMinMs) /
                              (_modelMaxMs - _modelMinMs)) *
                              100
                          )
                        )
                      : 0
                    thumb.style.left = `${pct}%`
                    label.textContent = item.date
                      ? formatDateShort(item.date)
                      : '—'
                  }
                  pswp.on('change', update)
                  update()
                },
              })
            }

            // Info panel — slides up from bottom when ⓘ is pressed
            pswp.ui.registerElement({
              name: 'pswp-info-panel',
              appendTo: 'root',
              onInit(el) {
                infoPanelEl = el
                const update = () => {
                  const item = filtered[pswp.currIndex]
                  if (!item) return
                  el.replaceChildren()

                  const typeBadge = document.createElement('span')
                  typeBadge.className = `type-badge ${item.type}`
                  typeBadge.textContent =
                    item.type === 'image' ? 'img' : item.type
                  el.appendChild(typeBadge)

                  if (item.flagged) {
                    const fb = document.createElement('span')
                    fb.className = 'pswp-info-flagged'
                    fb.textContent = 'FLAGGED'
                    el.appendChild(fb)
                  }

                  const dateSpan = document.createElement('span')
                  dateSpan.className = 'pswp-info-date'
                  dateSpan.textContent = formatDate(item.date)
                  if (item.source) {
                    dateSpan.appendChild(document.createTextNode(' '))
                    const srcSpan = document.createElement('span')
                    srcSpan.className = 'pswp-info-src'
                    srcSpan.textContent = `[${SOURCE_TIPS[item.source] || item.source}]`
                    dateSpan.appendChild(srcSpan)
                  }
                  el.appendChild(dateSpan)

                  const nameSpan = document.createElement('span')
                  nameSpan.className = 'pswp-info-filename'
                  nameSpan.textContent = item.filename
                  el.appendChild(nameSpan)

                  // Compact metadata line. For videos, show the resolution tier
                  // (HD/FHD/4K) instead of the raw W×H — the actual dimensions
                  // are kept on the title attribute for hover. Images still show
                  // dimensions since there's no equivalent tier to surface.
                  const metaBits = []
                  const tier =
                    item.type === 'video'
                      ? resolutionTier(item.width, item.height)
                      : null
                  if (tier) metaBits.push(tier.label)
                  else if (item.width && item.height)
                    metaBits.push(`${item.width}×${item.height}`)
                  const dur = formatDuration(item.duration)
                  if (dur) metaBits.push(dur)
                  const sz = formatFileSize(item.size)
                  if (sz) metaBits.push(sz)
                  if (metaBits.length) {
                    const metaSpan = document.createElement('span')
                    metaSpan.className = 'pswp-info-meta'
                    metaSpan.textContent = metaBits.join(' · ')
                    if (tier && item.width && item.height)
                      metaSpan.title = `${item.width}×${item.height}`
                    el.appendChild(metaSpan)
                  }

                  if (item.addedMs) {
                    const addedSpan = document.createElement('span')
                    addedSpan.className = 'pswp-info-added'
                    addedSpan.textContent = `Added ${formatDate(new Date(item.addedMs).toISOString())}`
                    el.appendChild(addedSpan)
                  }

                  // Caption (mobile only — desktop has the dedicated sidebar).
                  // Stamped synchronously with the rest of the panel, then filled
                  // in once the fetch resolves. Guarded against stale slide updates.
                  if (
                    item.hasCaption &&
                    window.matchMedia('(max-width: 900px)').matches
                  ) {
                    const capSpan = document.createElement('span')
                    capSpan.className = 'pswp-info-caption'
                    capSpan.textContent = '…'
                    el.appendChild(capSpan)
                    const idxAtStart = pswp.currIndex
                    loadCaption(item).then((text) => {
                      if (pswp.currIndex !== idxAtStart) return
                      capSpan.textContent = text || ''
                      if (!text) capSpan.remove()
                    })
                  }
                }
                pswp.on('change', update)
                update()
              },
            })

            // Caption sidebar — desktop only (≥901px). Hidden entirely when the
            // current slide has no caption so the media gets the full viewport.
            // The toggle button (below) also hides itself in that case.
            let captionBtnEl = null
            pswp.ui.registerElement({
              name: 'pswp-caption',
              appendTo: 'root',
              onInit(el) {
                captionPanelEl = el
                el.classList.add('pswp-caption-visible') // visible by default
                const update = async () => {
                  const item = filtered[pswp.currIndex]
                  if (!item) return
                  // No caption: hide the panel and the button. Media is full-bleed.
                  if (!item.hasCaption) {
                    el.classList.remove('pswp-caption-visible')
                    el.style.display = 'none'
                    el.replaceChildren()
                    if (captionBtnEl) {
                      captionBtnEl.style.display = 'none'
                      captionBtnEl.classList.remove('pswp-caption-active')
                    }
                    return
                  }
                  // Has a caption: show the button, render the panel.
                  if (captionBtnEl) captionBtnEl.style.display = ''
                  el.style.display = ''
                  el.classList.add('pswp-caption-visible')
                  if (captionBtnEl)
                    captionBtnEl.classList.add('pswp-caption-active')

                  el.replaceChildren()
                  const label = document.createElement('div')
                  label.className = 'pswp__pswp-caption-label'
                  label.textContent = 'Caption'
                  el.appendChild(label)
                  const body = document.createElement('div')
                  body.textContent = 'Loading…'
                  body.className = 'pswp__pswp-caption-empty'
                  el.appendChild(body)
                  const idxAtStart = pswp.currIndex
                  const text = await loadCaption(item)
                  if (pswp.currIndex !== idxAtStart) return
                  if (text) {
                    body.className = ''
                    body.textContent = text
                  } else {
                    // hasCaption was true but fetch failed — keep panel hidden
                    // rather than showing a broken empty state.
                    el.classList.remove('pswp-caption-visible')
                    el.style.display = 'none'
                    if (captionBtnEl) {
                      captionBtnEl.style.display = 'none'
                      captionBtnEl.classList.remove('pswp-caption-active')
                    }
                  }
                }
                pswp.on('change', update)
                update()
              },
            })

            // Caption toggle button — only meaningful on desktop, but harmless on
            // mobile (where the sidebar is hidden via CSS). Hidden by the panel's
            // update() handler whenever the current slide has no caption.
            pswp.ui.registerElement({
              name: 'pswp-caption-button',
              order: 8,
              isButton: true,
              title: 'Caption',
              html: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2.5" y="4" width="15" height="12" rx="1.5"/><line x1="5.5" y1="9" x2="14.5" y2="9"/><line x1="5.5" y1="12" x2="11" y2="12"/></svg>',
              onInit(el) {
                captionBtnEl = el
              },
              onClick(e, el) {
                if (!captionPanelEl) return
                const on = captionPanelEl.classList.toggle(
                  'pswp-caption-visible'
                )
                el.classList.toggle('pswp-caption-active', on)
              },
            })

            // Flag-for-deletion toggle. POSTs to /api/users/:user/flag, updates
            // the in-memory item, refreshes the card's red ribbon in the grid.
            let flagBtnEl = null
            const refreshFlagBtn = () => {
              const item = filtered[pswp.currIndex]
              if (!item || !flagBtnEl) return
              flagBtnEl.classList.toggle('pswp-flag-active', !!item.flagged)
              flagBtnEl.title = item.flagged ? 'Unflag (was marked for deletion)' : 'Flag for deletion'
            }
            pswp.ui.registerElement({
              name:     'pswp-flag-button',
              order:    7,
              isButton: true,
              title:    'Flag for deletion',
              html:     '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="2" x2="5" y2="18"/><path d="M5 3.5h10l-2 3 2 3H5"/></svg>',
              onInit(el) {
                flagBtnEl = el
                refreshFlagBtn()
                pswp.on('change', refreshFlagBtn)
              },
              async onClick(e, el) {
                const item = filtered[pswp.currIndex]
                if (!item || !currentUsername) return
                const next = !item.flagged
                el.disabled = true
                try {
                  const r = await fetch(
                    `/api/users/${encodeURIComponent(currentUsername)}/flag`,
                    {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ folder: item.folder, filename: item.filename, flagged: next }),
                    }
                  )
                  if (!r.ok) throw new Error('flag failed')
                  item.flagged = next
                  // Patch the underlying allMedia entry too (filtered may be a copy).
                  const src = allMedia.find((m) => m.folder === item.folder && m.filename === item.filename)
                  if (src) src.flagged = next
                  // Refresh the affected card in the grid without re-rendering everything.
                  const card = gridEl.querySelector(`.media-card[data-index="${pswp.currIndex}"]`)
                  if (card) {
                    card.classList.toggle('flagged', next)
                    let ribbon = card.querySelector('.card-flag-ribbon')
                    if (next && !ribbon) {
                      ribbon = document.createElement('div')
                      ribbon.className = 'card-flag-ribbon'
                      ribbon.title = 'Flagged for deletion'
                      ribbon.textContent = '🚩'
                      card.appendChild(ribbon)
                    } else if (!next && ribbon) {
                      ribbon.remove()
                    }
                  }
                  refreshFlagBtn()
                  updateStats()
                } catch {
                  // Soft fail — the next reload from the server will reconcile.
                } finally {
                  el.disabled = false
                }
              },
            })

            // ⓘ toggle button
            pswp.ui.registerElement({
              name: 'pswp-info-button',
              order: 9,
              isButton: true,
              title: 'Info',
              html: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="9" x2="10" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="6.5" r="1" fill="currentColor"/></svg>',
              onClick(e, el) {
                if (!infoPanelEl) return
                const on = infoPanelEl.classList.toggle('pswp-info-visible')
                el.classList.toggle('pswp-info-active', on)
              },
            })
          })

          // Play only the active slide's video; pause and rewind all others.
          // PhotoSwipe pre-creates ±1 adjacent slides, so without this swiping
          // quickly past videos layers audio across slides.
          const syncVideos = () => {
            const root = pswp.element
            if (!root) return
            root.querySelectorAll('.pswp__item video').forEach((v) => {
              const inActive =
                v.closest('.pswp__item.pswp__item--current') ||
                v.closest('.pswp__item--active')
              if (inActive) {
                v.play().catch(() => {})
              } else {
                v.pause()
                try {
                  v.currentTime = 0
                } catch {}
              }
            })
          }
          pswp.on('change', syncVideos)
          pswp.on('afterInit', syncVideos)
          pswp.on('close', () => {
            const root = pswp.element
            if (!root) return
            root.querySelectorAll('video').forEach((v) => {
              v.pause()
            })
          })

          pswp.init()
        })
      }

      // ─── CARD SIZE ────────────────────────────────────────────────────────
      const sizeBtns = document.querySelectorAll('.size-btn')
      const CARD_SIZES = { small: '160px', medium: '300px', large: '500px' }
      const MOBILE_COLS = { small: 4, medium: 2, large: 1 }
      const isMobile = () => window.matchMedia('(max-width: 640px)').matches

      sizeBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          sizeBtns.forEach((b) => b.classList.toggle('active', b === btn))
          if (isMobile()) {
            document.documentElement.style.setProperty(
              '--mobile-cols',
              MOBILE_COLS[btn.dataset.size]
            )
          } else {
            document.documentElement.style.setProperty(
              '--card-min',
              CARD_SIZES[btn.dataset.size]
            )
          }
        })
      })

      // ─── HOME GRID SIZE ───────────────────────────────────────────────────
      const HOME_CARD_SIZES = {
        small: '140px',
        medium: '200px',
        large: '280px',
      }
      const HOME_MOBILE_COLS = { small: 3, medium: 2, large: 1 }

      const homeShuffleBtn = document.getElementById('home-shuffle-btn')
      homeSortSelect.addEventListener('change', () => {
        homeSort = homeSortSelect.value
        if (homeSort === 'random') {
          // Re-picking Random always re-shuffles, so a second click gives a
          // fresh order even if you were already on Random.
          reshuffleHome()
          homeShuffleBtn.style.display = ''
        } else {
          homeShuffleBtn.style.display = 'none'
        }
        renderHomeGrid()
      })
      homeShuffleBtn.addEventListener('click', () => {
        reshuffleHome()
        renderHomeGrid()
      })

      // Stats expand/collapse — toggles the slide-down panel under the header.
      const statsToggleBtn = document.getElementById('stats-toggle')
      statsToggleBtn.addEventListener('click', () => {
        const panel = document.getElementById('stats-details')
        const open = panel.classList.toggle('open')
        statsToggleBtn.textContent = open ? '▴' : '▾'
        statsToggleBtn.title = open ? 'Hide details' : 'Show details'
      })

      homeSizeBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          homeSizeBtns.forEach((b) => b.classList.toggle('active', b === btn))
          if (isMobile()) {
            document.documentElement.style.setProperty(
              '--home-mobile-cols',
              HOME_MOBILE_COLS[btn.dataset.homeSize]
            )
          } else {
            document.documentElement.style.setProperty(
              '--home-card-min',
              HOME_CARD_SIZES[btn.dataset.homeSize]
            )
          }
        })
      })

      // ─── HOME BUTTON ──────────────────────────────────────────────────────
      document.getElementById('home-btn').addEventListener('click', () => {
        if (homeVisible) return
        showHomeView()
        userListEl
          .querySelectorAll('.user-item')
          .forEach((el) => el.classList.remove('active'))
      })

      // ─── MOBILE SIDEBAR ───────────────────────────────────────────────────
      const hamburger = document.getElementById('hamburger')
      const sidebarEl = document.getElementById('sidebar')
      const sidebarOverlay = document.getElementById('sidebar-overlay')

      function openSidebar() {
        sidebarEl.classList.add('open')
        sidebarOverlay.classList.add('visible')
        document.body.style.overflow = 'hidden'
      }

      function closeSidebar() {
        sidebarEl.classList.remove('open')
        sidebarOverlay.classList.remove('visible')
        document.body.style.overflow = ''
      }

      hamburger.addEventListener('click', () => {
        if (isMobile()) {
          sidebarEl.classList.contains('open') ? closeSidebar() : openSidebar()
        } else {
          document.body.classList.toggle('sidebar-collapsed')
        }
      })
      sidebarOverlay.addEventListener('click', closeSidebar)

      // ─── RESCAN + SCAN STATUS ─────────────────────────────────────────────
      const rescanBtn = document.getElementById('rescan-btn')
      const scanBanner = document.getElementById('scan-banner')
      const scanBannerText = document.getElementById('scan-banner-text')
      let scanPollTimer = null

      function setBanner(text) {
        if (!text) {
          scanBanner.style.display = 'none'
          return
        }
        scanBannerText.textContent = text
        scanBanner.style.display = 'block'
      }

      async function pollScanStatus(initialDelay = 1000) {
        clearTimeout(scanPollTimer)
        const tick = async () => {
          try {
            const r = await fetch('/api/scan-status')
            const s = r.ok ? await r.json() : null
            if (!s) return
            if (s.inProgress) {
              rescanBtn.disabled = true
              rescanBtn.classList.add('spinning')
              const trig = s.trigger ? `${s.trigger} ` : ''
              setBanner(
                `Scanning… ${trig}${s.modelsDone}/${s.modelsTotal} models`
              )
              scanPollTimer = setTimeout(tick, 1500)
            } else {
              rescanBtn.disabled = false
              rescanBtn.classList.remove('spinning')
              setBanner('')
              // Scan just completed — refresh stats once
              if (s.completedAt) refreshUsers()
            }
          } catch {
            rescanBtn.disabled = false
            rescanBtn.classList.remove('spinning')
          }
        }
        scanPollTimer = setTimeout(tick, initialDelay)
      }

      rescanBtn.addEventListener('click', async () => {
        if (rescanBtn.disabled) return
        rescanBtn.disabled = true
        rescanBtn.classList.add('spinning')
        try {
          await fetch('/api/rescan', { method: 'POST' })
          pollScanStatus(500)
        } catch {
          rescanBtn.disabled = false
          rescanBtn.classList.remove('spinning')
        }
      })

      // Poll once on load — if the server is mid-startup-scan, surface a banner.
      pollScanStatus(0)

      // ─── INIT ─────────────────────────────────────────────────────────────
      loadUsers()

      // Version / last-updated footer — refreshed on the same interval as user stats
      const sidebarFooterEl = document.getElementById('sidebar-footer')
      const fmtShort = (iso) =>
        iso
          ? new Date(iso).toLocaleString('en-US', {
              month: 'short',
              day: 'numeric',
              hour: 'numeric',
              minute: '2-digit',
              hour12: true,
            })
          : '—'
      function refreshFooter() {
        fetch('/api/info')
          .then((r) => r.json())
          .then((info) => {
            sidebarFooterEl.innerHTML = `<span>Registry: ${fmtShort(info.registryUpdatedAt)}</span><span>Server up: ${fmtShort(info.startedAt)}</span>`
          })
          .catch(() => {})
      }
      refreshFooter()
      setInterval(refreshFooter, 5 * 60 * 1000)
    </script>
  </body>
</html>
