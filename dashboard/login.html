<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dataset Dashboard</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0d0d12;
        --card-bg: #1a1a24;
        --border: #2a2a3a;
        --accent: #7c6cfc;
        --text: #e0e0f0;
        --muted: #7070a0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 36px 32px;
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      h1 {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        text-align: center;
      }
      input[type='password'] {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s;
      }
      input[type='password']:focus {
        border-color: var(--accent);
      }
      input[type='password']::placeholder {
        color: var(--muted);
      }
      button {
        width: 100%;
        background: var(--accent);
        border: none;
        border-radius: 6px;
        color: #fff;
        padding: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover {
        opacity: 0.85;
      }
      .error {
        font-size: 12px;
        color: #e88a6a;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Dataset Dashboard</h1>
      <form method="POST" action="/auth">
        <div style="display: flex; flex-direction: column; gap: 12px">
          <input
            type="password"
            name="password"
            placeholder="Password"
            autofocus
            autocomplete="current-password"
          />
          <button type="submit">Unlock</button>
        </div>
      </form>
      <script>
        if (new URLSearchParams(location.search).get('error')) {
          const p = document.createElement('p')
          p.className = 'error'
          p.textContent = 'Incorrect password'
          document.querySelector('.card').appendChild(p)
        }
      </script>
    </div>
  </body>
</html>
